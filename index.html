<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fight 3.0.0</title>
<style>
body { margin:0; background:#000; }
canvas { display:block; margin:auto; background: linear-gradient(#111,#222); }
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.8;
let keys = {};
let gameOver = false;
let particles = [];

function makePlayer(x, color){
  return {
    x, y: 320, w: 50, h: 50,
    dx: 0, dy: 0,
    color,
    hp: 100,
    energy: 0,
    attackCooldown: 0
  };
}

let p1 = makePlayer(100, "blue");
let p2 = makePlayer(750, "red");

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key==="r") reset();

  if(!gameOver){
    // P1
    if(e.key==="j") attack(p1,p2,8);
    if(e.key==="k") attack(p1,p2,12);
    if(e.key==="l") special(p1,p2);

    // P2
    if(e.key==="1") attack(p2,p1,8);
    if(e.key==="2") attack(p2,p1,12);
    if(e.key==="3") special(p2,p1);
  }
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

function hit(a,b){
  return a.x < b.x + b.w && a.x + a.w > b.x;
}

function addParticles(x,y,color){
  for(let i=0;i<8;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6,
      life:20,
      color
    });
  }
}

function attack(a,b,dmg){
  if(a.attackCooldown>0) return;
  a.attackCooldown = 15;

  if(hit(a,b)){
    b.hp -= dmg;
    a.energy += 8;
    addParticles(b.x,b.y,b.color);
  }
}

function special(a,b){
  if(a.energy<25) return;
  a.energy -= 25;

  if(hit(a,b)){
    b.hp -= 30;
    addParticles(b.x,b.y,"yellow");
  }
}

function updatePlayer(p,left,right,jump){
  p.dx = 0;

  if(keys[left]) p.dx = -5;
  if(keys[right]) p.dx = 5;

  if(keys[jump] && p.y>=320){
    p.dy = -12;
  }

  p.dy += gravity;
  p.x += p.dx;
  p.y += p.dy;

  if(p.y>320){
    p.y=320;
    p.dy=0;
  }

  if(p.attackCooldown>0) p.attackCooldown--;

  if(p.energy>100) p.energy=100;
}

function ai(){
  if(Math.random()<0.02){
    if(p2.x>p1.x) p2.dx=-2;
    else p2.dx=2;
  }
}

function update(){
  if(gameOver) return;

  updatePlayer(p1,"a","d","w");
  updatePlayer(p2,"ArrowLeft","ArrowRight","ArrowUp");

  ai();

  if(hit(p1,p2) && Math.random()<0.03) p1.hp -= 1;
  if(hit(p2,p1) && Math.random()<0.03) p2.hp -= 1;

  if(p1.hp<=0 || p2.hp<=0) gameOver=true;

  particles.forEach(pt=>{
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.life--;
  });

  particles = particles.filter(p=>p.life>0);
}

function draw(){
  ctx.clearRect(0,0,900,450);

  // chão
  ctx.fillStyle="#444";
  ctx.fillRect(0,370,900,80);

  // partículas
  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,4,4);
  });

  // players
  ctx.fillStyle=p1.color;
  ctx.fillRect(p1.x,p1.y,p1.w,p1.h);

  ctx.fillStyle=p2.color;
  ctx.fillRect(p2.x,p2.y,p2.w,p2.h);

  // HUD
  ctx.fillStyle="blue";
  ctx.fillRect(20,20,p1.hp*2,15);

  ctx.fillStyle="red";
  ctx.fillRect(580,20,p2.hp*2,15);

  ctx.fillStyle="cyan";
  ctx.fillRect(20,40,p1.energy*2,10);

  ctx.fillStyle="cyan";
  ctx.fillRect(580,40,p2.energy*2,10);

  ctx.fillStyle="white";
  ctx.font="28px Arial";

  if(gameOver){
    let txt = p1.hp>0 ? "Azul venceu!" : "Vermelho venceu!";
    ctx.fillText(txt, 350,200);
    ctx.font="18px Arial";
    ctx.fillText("Pressione R para reiniciar",320,240);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function reset(){
  p1 = makePlayer(100,"blue");
  p2 = makePlayer(750,"red");
  particles = [];
  gameOver = false;
}

loop();
</script>

</body>
</html>
