<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fight 3.1.0</title>
<style>
body { margin:0; background:#000; }
canvas { display:block; margin:auto; background:linear-gradient(#111,#222); }
</style>
</head>
<body>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
let gameOver = false;
let particles = [];

const gravity = 0.8;

function makePlayer(x,color){
  return {
    x,y:320,w:50,h:50,
    dx:0,dy:0,
    color,
    hp:100,
    energy:0,
    cd:0
  };
}

let p1 = makePlayer(100,"blue");
let p2 = makePlayer(750,"red");

document.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key==="r") reset();

  if(!gameOver){
    if(e.key==="j") attack(p1,p2,8);
    if(e.key==="k") attack(p1,p2,12);
    if(e.key==="l") special(p1,p2);
  }
});

document.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

function hit(a,b){
  return a.x < b.x + b.w && a.x + a.w > b.x;
}

function particlesFX(x,y,color){
  for(let i=0;i<6;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*5,
      vy:(Math.random()-0.5)*5,
      life:15,
      color
    });
  }
}

function attack(a,b,dmg){
  if(a.cd>0) return;
  a.cd = 12;

  if(hit(a,b)){
    b.hp -= dmg;
    a.energy += 10;
    particlesFX(b.x,b.y,b.color);
  }
}

function special(a,b){
  if(a.energy<25) return;
  a.energy -= 25;

  if(hit(a,b)){
    b.hp -= 30;
    particlesFX(b.x,b.y,"yellow");
  }
}

function updatePlayer(p,left,right,jump){
  p.dx = 0;

  if(keys[left]) p.dx = -5;
  if(keys[right]) p.dx = 5;

  if(keys[jump] && p.y>=320){
    p.dy = -12;
  }

  p.dy += gravity;
  p.x += p.dx;
  p.y += p.dy;

  if(p.y>320){
    p.y=320;
    p.dy=0;
  }

  if(p.cd>0) p.cd--;
  if(p.energy>100) p.energy=100;
}

function enemyAI(){
  // 🔥 IA REAL FUNCIONANDO
  let dist = p1.x - p2.x;

  // movimento contínuo
  if(Math.abs(dist) > 5){
    p2.x += dist > 0 ? 2.2 : -2.2;
  }

  // pulo ocasional
  if(Math.random() < 0.01 && p2.y>=320){
    p2.dy = -11;
  }

  // ataque automático
  if(Math.abs(dist) < 60){
    attack(p2,p1,6);
  }
}

function update(){
  if(gameOver) return;

  updatePlayer(p1,"a","d","w");
  updatePlayer(p2,"ArrowLeft","ArrowRight","ArrowUp");

  enemyAI();

  particles.forEach(pt=>{
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.life--;
  });

  particles = particles.filter(p=>p.life>0);

  if(p1.hp<=0 || p2.hp<=0) gameOver=true;
}

function draw(){
  ctx.clearRect(0,0,900,450);

  ctx.fillStyle="#444";
  ctx.fillRect(0,370,900,80);

  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,4,4);
  });

  ctx.fillStyle="blue";
  ctx.fillRect(p1.x,p1.y,p1.w,p1.h);

  ctx.fillStyle="red";
  ctx.fillRect(p2.x,p2.y,p2.w,p2.h);

  // HP
  ctx.fillStyle="blue";
  ctx.fillRect(20,20,p1.hp*2,15);

  ctx.fillStyle="red";
  ctx.fillRect(580,20,p2.hp*2,15);

  // energia
  ctx.fillStyle="cyan";
  ctx.fillRect(20,40,p1.energy*2,10);

  ctx.fillStyle="white";
  ctx.font="26px Arial";

  if(gameOver){
    ctx.fillText(p1.hp>0?"Azul venceu!":"Vermelho venceu!",320,200);
    ctx.font="18px Arial";
    ctx.fillText("Pressione R para reiniciar",310,240);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function reset(){
  p1 = makePlayer(100,"blue");
  p2 = makePlayer(750,"red");
  particles = [];
  gameOver = false;
}

loop();
</script>

</body>
</html>
